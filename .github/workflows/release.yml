name: Release FPA

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version (e.g. 1.0.4). Leave empty to use conf.yml.
        required: false
        default: ""
      environment:
        description: Mythic Marketplace environment
        type: choice
        options:
          - production
          - dev
        default: production
      changelog:
        description: Release notes. Leave empty to auto-generate from commits since the last tag.
        required: false
        default: ""
   
permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            ver="${GITHUB_REF_NAME#v}"
          elif [ -n "${{ inputs.version }}" ]; then
            ver="${{ inputs.version }}"
          else
            ver="$(grep -E '^\s*version:' conf.yml | head -1 | sed -E 's/^[[:space:]]*version:[[:space:]]*//; s/["'\'']//g')"
          fi
          if [ -z "${ver}" ]; then
            echo "::error::Could not resolve release version. Set the version input or add version to conf.yml."
            exit 1
          fi
          echo "version=${ver}" >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        id: changelog
        shell: bash
        run: |
          outfile="${RUNNER_TEMP}/changelog.md"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.changelog }}" ]; then
            printf '%s\n' "${{ inputs.changelog }}" > "${outfile}"
          else
            if [ "${{ github.event_name }}" = "push" ]; then
              prev="$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || true)"
            else
              prev="$(git describe --tags --abbrev=0 2>/dev/null || true)"
            fi
            if [ -n "${prev}" ]; then
              git log "${prev}..HEAD" --pretty=format:'- %s (%h)' --no-merges > "${outfile}" || true
            else
              git log --pretty=format:'- %s (%h)' --no-merges -30 > "${outfile}" || true
            fi
            if [ ! -s "${outfile}" ]; then
              printf 'Release %s\n' "${{ steps.version.outputs.version }}" > "${outfile}"
            fi
          fi
          {
            echo 'text<<CHANGELOG_EOF'
            cat "${outfile}"
            echo 'CHANGELOG_EOF'
          } >> "$GITHUB_OUTPUT"
          echo "file=${outfile}" >> "$GITHUB_OUTPUT"

      - name: Build .fpa
        id: build
        uses: MythicalLTD/.github/actions/build-fpa@v1
        with:
          build_frontend: "false"
          artifact_name: ""

      - name: Publish to Mythic Marketplace
        id: publish
        uses: MythicalLTD/.github/actions/publish-release@v1
        with:
          product_id: ${{ secrets.MYTHIC_PRODUCT_ID }}
          environment: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'production' }}
          version: ${{ steps.version.outputs.version }}
          changelog: ${{ steps.changelog.outputs.text }}
          file_path: ${{ steps.build.outputs.fpa_file }}
          title: "${{ steps.build.outputs.plugin_identifier }} ${{ steps.version.outputs.version }}"
        secrets:
          release_token: ${{ secrets.MYTHIC_RELEASE_TOKEN }}

      - name: Create GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ver="${{ steps.version.outputs.version }}"
          tag="v${ver}"
          gh release create "${tag}" \
            "${{ steps.build.outputs.fpa_file }}" \
            --title "${tag}" \
            --notes-file "${{ steps.changelog.outputs.file }}"

      - name: Release summary
        if: success()
        shell: bash
        run: |
          {
            echo "### Release published"
            echo "| Plugin | \`${{ steps.build.outputs.plugin_identifier }}\` |"
            echo "| Version | \`${{ steps.version.outputs.version }}\` |"
            echo "| FPA | \`${{ steps.build.outputs.fpa_filename }}\` |"
            echo "| Environment | \`${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'production' }}\` |"
            echo "| Marketplace release | \`${{ steps.publish.outputs.release_url }}\` |"
            echo "| GitHub release | [\`v${{ steps.version.outputs.version }}\`](${{ github.server_url }}/${{ github.repository }}/releases/tag/v${{ steps.version.outputs.version }}) |"
          } >> "$GITHUB_STEP_SUMMARY"
